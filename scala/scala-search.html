
<!DOCTYPE html>
<html>
<head>
    <style>
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(250, 250, 250, 0.85);
            color: black;
            padding: 10px 16px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 9999;
            }
    </style>
    <title>SCL Database</title>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
</head>
<body>
<div id="toast"></div>
<table id="table" class="display">
    <thead>
        <tr>
            <th>Name</th>
            <th>Size</th>
            <th>Description</th>
        </tr>
    </thead>
</table>

<script>
function showToast(message) {
    const toast = document.getElementById("toast");

    toast.textContent = message;
    toast.style.opacity = "1";
    toast.style.transform = "translateX(-50%) translateY(0px)";

    clearTimeout(window.toastTimeout);

    window.toastTimeout = setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateX(-50%) translateY(-20px)";
    }, 1500);
}
fetch('https://docpoacher.github.io/website/scala/data.json')
    .then(r => {
        console.log("status:", r.status);
        return r.text();
    })
    .then(t => {
        console.log("raw response:", t);
        return JSON.parse(t);
    })
    .then(data => {
        console.log("parsed:", data);

        $('#table').DataTable({
            pageLength: 20,
            lengthMenu: [10, 20, 25, 30, 50, 100, 250],
            data: data,
            columns: [
                {
                    data: 'name',
                    render: function(data) {
                        return `<span class="copy-name" style="cursor:pointer; ">
                                    ${data}
                                </span>`;
                }
    },
    { data: 'size' },
    { data: 'description' }
]
        });
    })
    .catch(err => console.error("ERROR:", err));
$('#table').on('click', '.copy-name', function () {
    const text = $(this).text();

    navigator.clipboard.writeText(text).then(() => {
        showToast(`Copied "${text}" to clipboard`);
    });
});

</script>

</body>
</html>
